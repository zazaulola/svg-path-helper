name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Package VSIX
        run: npx --yes @vscode/vsce package --no-dependencies -o svg-path-helper.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: svg-path-helper-vsix
          path: svg-path-helper.vsix
          if-no-files-found: error
